name: Extract NiriWM ISO and Release
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y wget libarchive-tools squashfs-tools jq
      - name: Create directories
        run: mkdir -p iso source-iso
      - name: Download latest ISO from SourceForge
        run: |
          set -e
          echo "Fetching ISO filename from SourceForge JSON API..."
          ISO_FILENAME=$(curl -sL \
            "https://sourceforge.net/projects/rengeos/files/RengeOS-ISO/Latest/NiriWM-Edition/?limit=10&sort=date%20desc&format=json" \
            | jq -r '.files[] | select(.name | endswith(".iso")) | .name' \
            | head -n1)
          echo "ISO filename: $ISO_FILENAME"
          if [ -z "$ISO_FILENAME" ]; then
            echo "Could not determine ISO filename from SourceForge API:("
            exit 1
          fi
          ISO_URL="https://sourceforge.net/projects/rengeos/files/RengeOS-ISO/Latest/NiriWM-Edition/${ISO_FILENAME}/download"
          echo "Downloading from: $ISO_URL"
          wget -O "source-iso/${ISO_FILENAME}" "$ISO_URL"
      - name: Set ISO variables
        run: |
          ISO_NAME=$(ls source-iso/*.iso | xargs -n1 basename)
          BASE_NAME=${ISO_NAME%.iso}
          TAG_NAME=${BASE_NAME}-system-ota
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
      - name: Extract ISO
        run: |
          cd source-iso
          bsdtar -xf *.iso -C ../iso
          cd ..
      - name: Extract os-release from airootfs
        run: |
          mkdir -p iso/temp-mnt
          unsquashfs -f -no-xattrs -d iso/temp-mnt iso/arch/x86_64/airootfs.sfs
      - name: Fetch release notes
        run: |
          wget -O release-notes.md https://raw.githubusercontent.com/RengeOS/Release-Notes/main/release-notes.md
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          cat release-notes.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          body: ${{ env.RELEASE_NOTES }}
          files: |
            iso/arch/boot/x86_64/vmlinuz-*
            iso/arch/x86_64/*
            iso/temp-mnt/etc/os-release
