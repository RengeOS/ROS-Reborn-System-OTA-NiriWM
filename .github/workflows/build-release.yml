name: Extract NiriWM ISO and Release
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y wget libarchive-tools squashfs-tools jq
      - name: Create directories
        run: mkdir -p iso source-iso airootfs_parts
      - name: Download all files in NiriWM-Edition from SourceForge
        run: |
          set -e
          SF_PAGE="https://sourceforge.net/projects/rengeos/files/RengeOS-ISO/Latest/NiriWM-Edition"
          echo "Fetching all download URLs from SourceForge page..."
          curl -sL "$SF_PAGE" \
            | grep -oP 'https://sourceforge\.net/projects/rengeos/files/RengeOS-ISO/Latest/NiriWM-Edition/[^"]+/download' \
            | sort -u > /tmp/sf_urls.txt
          echo "Found URLs:"
          cat /tmp/sf_urls.txt
          while IFS= read -r url; do
            FILENAME=$(basename "$(dirname "$url")")
            echo "Downloading: $FILENAME"
            wget -O "source-iso/${FILENAME}" "$url"
          done < /tmp/sf_urls.txt
      - name: Set ISO variables
        run: |
          ISO_PATH=$(ls source-iso/*.iso | head -n1)
          ISO_NAME=$(basename "$ISO_PATH")
          BASE_NAME=${ISO_NAME%.iso}
          TAG_NAME=${BASE_NAME}-system-ota
          echo "ISO_PATH=$ISO_PATH" >> $GITHUB_ENV
          echo "ISO_NAME=$ISO_NAME" >> $GITHUB_ENV
          echo "BASE_NAME=$BASE_NAME" >> $GITHUB_ENV
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
      - name: Extract ISO
        run: |
          cd source-iso
          bsdtar -xf *.iso -C ../iso
          cd ..
      - name: Extract os-release from airootfs
        run: |
          mkdir -p iso/temp-mnt
          unsquashfs -f -no-xattrs -d iso/temp-mnt iso/arch/x86_64/airootfs.sfs
      - name: Split airootfs.sfs into parts
        run: |
          SFS_PATH="iso/arch/x86_64/airootfs.sfs"
          SFS_NAME="airootfs.sfs"
          echo "Splitting $SFS_PATH into 1800MB parts..."
          split -b 1800M --numeric-suffixes=1 --suffix-length=3 "$SFS_PATH" "airootfs_parts/${SFS_NAME}.part"
          echo "Generated parts:"
          ls -lh airootfs_parts/
      - name: Copy SHA256 checksums
        run: |
          if ls source-iso/*.sha256 1>/dev/null 2>&1; then
            cp source-iso/*.sha256 airootfs_parts/
            echo "Copied SHA256 files:"
            ls -lh airootfs_parts/*.sha256
          else
            echo "No .sha256 files found in source-iso/, skipping."
          fi
      - name: Fetch release notes
        run: |
          wget -O release-notes.md https://raw.githubusercontent.com/RengeOS/Release-Notes/main/release-notes.md
          echo "RELEASE_NOTES<<EOF" >> $GITHUB_ENV
          cat release-notes.md >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          body: ${{ env.RELEASE_NOTES }}
          files: |
            iso/arch/boot/x86_64/vmlinuz-*
            iso/temp-mnt/etc/os-release
            airootfs_parts/*
